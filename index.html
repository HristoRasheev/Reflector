<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reflector — Their music, your reflection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@700&family=Roboto:wght@400&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <section class="hero">
        <div class="bg-glow"></div>

        <div class="circle-graphic">
            <img src="assets/Logo.png" alt="Reflector app graphic" />

        <nav>
            <div class="nav-logo-wrap">
                <div class="nav-logo-icon">
                    <img src="assets/just_the_logo.png" alt="Reflector logo" />

                <span class="nav-logo-text">Reflector</span>
            </div>
            <ul class="nav-links">
                <li><a href="about.html">About</a></li>

        <div class="hero-content">
            <h1 class="hero-headline">
                <span class="headline-line1">Their music,</span>
                <span class="headline-line2">
                    <span class="headline-your">your</span>
                    <span class="headline-reflection">&nbsp;reflection</span>
                </span>
            </h1>

            <button class="btn-join" onclick="goToLogin()">
                <div class="btn-glass-blur"></div>
